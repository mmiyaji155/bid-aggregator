{# インライン SVG アイコン（Lucide 由来のパス・ISC License）。絵文字は使用しない（v2.4）。
   stroke=currentColor で文脈の文字色を継承。装飾用途は aria-hidden。 #}
{% macro icon(name, size=16, stroke=2, class='') -%}
<svg class="icon {{ class }}" width="{{ size }}" height="{{ size }}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="{{ stroke }}" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
{%- if name == 'layout-dashboard' -%}
<rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/>
{%- elif name == 'search' -%}
<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
{%- elif name == 'kanban' -%}
<path d="M5 3v14"/><path d="M12 3v8"/><path d="M19 3v18"/>
{%- elif name == 'bell' -%}
<path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
{%- elif name == 'star' -%}
<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
{%- elif name == 'inbox' -%}
<polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>
{%- elif name == 'alert-triangle' -%}
<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/>
{%- elif name == 'arrow-left' -%}
<path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>
{%- elif name == 'arrow-right' -%}
<path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
{%- elif name == 'external-link' -%}
<path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
{%- elif name == 'menu' -%}
<line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/>
{%- elif name == 'arrow-right-left' -%}
<path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/>
{%- elif name == 'clipboard-list' -%}
<rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/>
{%- elif name == 'file-text' -%}
<path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/>
{%- elif name == 'calendar' -%}
<path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/>
{%- elif name == 'pencil' -%}
<path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/>
{%- elif name == 'x' -%}
<path d="M18 6 6 18"/><path d="m6 6 12 12"/>
{%- elif name == 'plus' -%}
<path d="M5 12h14"/><path d="M12 5v14"/>
{%- endif -%}
</svg>
{%- endmacro %}
